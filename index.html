<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRY | Global Security, Aviation &amp; Investigations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /**
     * Walmart Global Security – SENTRY Design System
     *
     * Brand palette:
     *   True Blue       #0053E2   — primary interactive, active states, CTAs
     *   Spark Yellow    #FFC220   — accent, highlights, emphasis, selections
     *   Bentonville Blue #001E60  — card / panel backgrounds
     *   Everyday Blue   #4DBDF5  — secondary / muted text
     *   Sky Blue        #A9DDF7  — subtle text, placeholders
     *   White           #FFFFFF   — primary text on dark surfaces
     *
     * Dark background ladder (deep → raised):
     *   void    #000B28   ← page canvas, input wells
     *   base    #001040   ← card sub-panels, nav
     *   card    #001E60   ← Bentonville Blue (cards float on void)
     *   lift    #002880   ← borders, dividers, hover highlights
     */
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // ── Walmart semantic tokens ─────────────────────────────────────
            wmt: {
              blue:      '#0053E2',  // True Blue  — primary action
              yellow:    '#FFC220',  // Spark Yellow — accent
              navy:      '#001E60',  // Bentonville Blue
              everyday:  '#4DBDF5',  // Everyday Blue
              sky:       '#A9DDF7',  // Sky Blue
              void:      '#000B28',  // page background
              lift:      '#002880',  // borders / hover
            },
            // ── sentry.* tokens used throughout components ──────────────────
            sentry: {
              dark:     '#000B28',  // void — page bg (was dark slate)
              card:     '#001E60',  // Bentonville Blue — card bg
              accent:   '#FFC220',  // Spark Yellow — replaces sky-blue accent
              blue:     '#0053E2',  // True Blue — CTAs, links
              success:  '#22c55e',  // semantic green
              warning:  '#FFC220',  // Spark Yellow doubles as warning
              danger:   '#ef4444',  // semantic red
            },
            // ── Remap slate → Walmart navy ladder ──────────────────────────
            // Every bg-slate-*, text-slate-*, border-slate-* in components
            // automatically picks up Walmart navy tones.
            slate: {
              50:  '#f0f7ff',
              100: '#d9eeff',
              200: '#b8dcff',
              300: '#A9DDF7',  // Sky Blue  — high-contrast muted text
              400: '#4DBDF5',  // Everyday Blue — secondary text
              500: '#2d8dbf',  // mid-blue muted
              600: '#1a5c99',  // dimmed elements
              700: '#002880',  // borders / lift
              800: '#001040',  // sub-panels inside cards
              900: '#000B28',  // void — input wells, deepest bg
            },
          },
          fontFamily: {
            sans: ['system-ui', 'Segoe UI', 'sans-serif'],
            mono: ['Consolas', 'Menlo', 'monospace'],
          },
          keyframes: {
            'pulse-slow': {
              '0%, 100%': { opacity: '1' },
              '50%':       { opacity: '0.4' },
            },
            shine: {
              '100%': { left: '125%' },
            },
            fadeIn: {
              '0%':   { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
          animation: {
            'pulse-slow': 'pulse-slow 3s ease-in-out infinite',
            shine:        'shine 0.7s ease-in-out',
            fadeIn:       'fadeIn 0.4s ease-out both',
          },
        },
      },
    };
  </script>
  <style>
    /* ── Scrollbar — Walmart navy ────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #000B28; }
    ::-webkit-scrollbar-thumb { background: #002880; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #0053E2; }

    /* ── Base ──────────────────────────────────────────────────────────── */
    body {
      background-color: #000B28;
      color: #FFFFFF;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Selection highlight — Spark Yellow ─────────────────────────── */
    ::selection {
      background-color: #FFC220;
      color: #000B28;
    }

    /* ── Focus ring — True Blue ──────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid #0053E2;
      outline-offset: 2px;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
