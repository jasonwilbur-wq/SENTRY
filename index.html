<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SENTRY — Walmart Global Security's definitive system of record for Emerging Technology vendor assessment, risk transparency, and AI-driven governance." />
  <meta name="theme-color" content="#000B28" />
  <meta property="og:title" content="SENTRY | Emerging Technology Security" />
  <meta property="og:description" content="Identify risks. Visualize architecture. Govern with AI-driven insights." />
  <meta property="og:type" content="website" />
  <title>SENTRY | Global Security, Aviation &amp; Investigations</title>

  <!-- Inter — premium legibility at every weight -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />

  <!-- Canonical -->
  <link rel="canonical" href="/" />

  <!-- Open Graph -->
  <meta property="og:url"   content="/" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Web App Manifest (enables Add to Home Screen on Chromium) -->
  <link rel="manifest" href="/manifest.json" />

  <!-- High-res favicon: navy shield with yellow spark spark -->
  <link rel="icon" sizes="32x32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23000B28'/><text x='4' y='26' font-size='22'>🛡️</text></svg>" />

  <!-- Anti-FOUC: apply saved theme AND reduced-motion preference before first paint -->
  <script>
    (function() {
      var t = localStorage.getItem('sentry-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'dark') document.documentElement.classList.add('dark');
      }
      // Also restore reduced-motion flag so no animation flicker on load
      var m = localStorage.getItem('sentry-reduced-motion');
      if (m === 'true') document.documentElement.setAttribute('data-reduced-motion', 'true');
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
