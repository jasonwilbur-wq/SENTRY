<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTRY Framework</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sentry: {
              dark: '#0f172a',
              card: '#1e293b',
              accent: '#38bdf8',
              success: '#4ade80',
              warning: '#fbbf24',
              danger: '#f87171',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for cyber aesthetic */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    body {
      background-color: #0f172a;
      color: #f8fafc;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
